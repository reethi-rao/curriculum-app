document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n                  <div style=\"display:inline-flex;align-items:center;padding:8px 16px;border-radius:12px;background:#eef3f1;color:#4a6b67;font-size:16px;font-weight:600;font-family:Lexend;\">Due {{ t.due }}<\u002Fdiv>\n                  <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9bb0ac\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isCourses }}\">\n        <div>\n          <h1 style=\"font-family:Lexend;font-weight:700;font-size:36px;margin:0 0 8px;color:#243534;letter-spacing:-0.5px;\">My Courses<\u002Fh1>\n          <p style=\"font-size:20px;color:#5e706e;margin:0 0 30px;\">Pick a course to see your lessons.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:20px;\">\n            <sc-for list=\"{{ coursesList }}\" as=\"c\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ c.open }}\" style=\"display:flex;align-items:center;gap:24px;width:100%;text-align:left;background:#fff;border:1px solid #e2ece9;border-radius:24px;padding:30px;cursor:pointer;box-shadow:0 8px 22px rgba(40,80,76,0.06);\" style-hover=\"border-color:#bcd6d0;box-shadow:0 12px 28px rgba(40,80,76,0.12);\">\n                <div style=\"width:74px;height:74px;border-radius:20px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:Lexend;font-weight:700;font-size:28px;flex-shrink:0;background:{{ c.color }};\">{{ c.initial }}<\u002Fdiv>\n                <div style=\"flex:1;\">\n                  <div style=\"font-family:Lexend;font-weight:700;font-size:25px;color:#243534;margin-bottom:12px;\">{{ c.name }}<\u002Fdiv>\n                  <div style=\"height:14px;border-radius:8px;background:#edf3f1;overflow:hidden;margin-bottom:8px;max-width:420px;\">\n =\"font-family:Lexend;font-weight:700;font-size:34px;margin:0 0 8px;color:#243534;letter-spacing:-0.5px;\">Turn in your homework<\u002Fh1>\n          <p style=\"font-size:20px;color:#5e706e;margin:0 0 28px;\">For: <span style=\"color:#2f6f68;font-weight:700;\">{{ curLesson.title }}<\u002Fspan><\u002Fp>\n\n          <div style=\"background:#fff;border:1px solid #e2ece9;border-radius:22px;padding:30px;margin-bottom:22px;\">\n            <h2 style=\"font-family:Lexend;font-weight:700;font-size:21px;margin:0 0 16px;color:#243534;\">1. Add your file<\u002Fh2>\n            <div style=\"border:3px dashed #cfe0dc;border-radius:18px;padding:34px;text-align:center;background:#f7fbfa;\">\n              <div style=\"display:flex;justify-content:center;margin-bottom:14px;\"><svg width=\"46\" height=\"46\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4f9a93\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 16V5\"><\u002Fpath><path d=\"M7 9l5-5 5 5\"><\u002Fpath><path d=\"M5 19h14\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <p style=\"font-size:19px;color:#5e706e;margin:0 0 18px;\">Choose the file you made for this lesson.<\u002Fp>\n              <button onclick=\"{{ pickFile }}\" style=\"display:inline-flex;align-items:center;justify-content:center;min-height:58px;padding:0 30px;border:none;border-radius:16px;background:#4f9a93;color:#fff;font-family:Lexend;font-size:19px;font-weight:600;cursor:pointer;\" style-hover=\"background:#43857f;\">Choose a file<\u002Fbutton>\n              <input type=\"file\" multiple=\"\" ref=\"{{ fileInputRef }}\" onchange=\"{{ onPick }}\" style=\"display:none;\">\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ hasFiles }}\">\n              <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:18px;\">\n                <sc-for list=\"{{ files }}\" as=\"f\" hint-placeholder-count=\"1\">\n                  <div style=\"display:flex;align-items:center;gap:14px;background:#eef6f4;border:1px solid #d6e7e3;border-radius:14px;padding:14px 18px;\">\n                    <div style=\"width:38px;height:38px;border-radius:10px;background:#4f9a93;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                    <div style=\"flex:1;font-size:18px;font-weight:600;color:#2f6f68;font-family:Lexend;word-break:break-all;\">{{ f.name }}<\u002Fdiv>\n                    <button onclick=\"{{ f.remove }}\" style=\"min-height:40px;padding:0 16px;border:2px solid #cfe0dc;border-radius:11px;background:#fff;color:#5e706e;font-family:Lexend;font-size:15px;font-weight:600;cursor:pointer;\" style-hover=\"background:#f3f9f8;\">Remove<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border:1px solid #e2ece9;border-radius:22px;padding:30px;margin-bottom:26px;\">\n            <h2 style=\"font-family:Lexend;font-weight:700;font-size:21px;margin:0 0 6px;color:#243534;\">2. Add a note <span style=\"font-weight:500;font-size:17px;color:#9aa8a5;\">(optional)<\u002Fspan><\u002Fh2>\n            <p style=\"font-size:17px;color:#6f817e;margin:0 0 16px;\">Want to tell your teacher something? You can write it here.<\u002Fp>\n            <textarea value=\"{{ note }}\" onchange=\"{{ onNote }}\" placeholder=\"Type a note for your teacher...\" style=\"width:100%;min-height:110px;resize:vertical;border:2px solid #dde7e4;border-radius:14px;padding:16px 18px;font-family:'Atkinson Hyperlegible',sans-serif;font-size:18px;line-height:1.6;color:#33433f;background:#fbfdfc;\" style-focus=\"border-color:#4f9a93;\"><\u002Ftextarea>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;\">\n            <button onclick=\"{{ doSubmit }}\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:10px;min-height:66px;padding:0 40px;border:none;border-radius:18px;background:#4f9a93;color:#fff;font-family:Lexend;font-size:22px;font-weight:600;cursor:pointer;box-shadow:0 6px 18px rgba(79,154,147,0.32);\" style-hover=\"background:#43857f;\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 6\"><\u002Fpath><\u002Fsvg>Turn it in<\u002Fbutton>\n            <span style=\"font-size:16px;color:#8a9794;\">Don't worry — you can change this later.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isDone }}\">\n        <div style=\"text-align:center;padding-top:30px;\">\n          <div style=\"width:120px;height:120px;border-radius:50%;background:#dcebe8;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;\"><svg width=\"64\" height=\"64\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4f9a93\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h1 style=\"font-family:Lexend;font-weight:700;font-size:42px;margin:0 0 12px;color:#243534;letter-spacing:-0.5px;\">All done!<\u002Fh1>\n          <p style=\"font-size:22px;color:#4a5d5a;margin:0 0 6px;max-width:520px;margin-left:auto;margin-right:auto;line-height:1.5;\">Your homework for <span style=\"color:#2f6f68;font-weight:700;\">{{ curLesson.title }}<\u002Fspan> is turned in.<\u002Fp>\n          <p style=\"font-size:19px;color:#7c8d8a;margin:0 0 34px;\">Your teacher will see it soon. Great work.<\u002Fp>\n          <div style=\"display:flex;gap:16px;justify-content:center;flex-wrap:wrap;\">\n            <button onclick=\"{{ resetHome }}\" style=\"display:inline-flex;align-items:center;justify-content:center;min-height:62px;padding:0 34px;border:none;border-radius:16px;background:#4f9a93;color:#fff;font-family:Lexend;font-size:20px;font-weight:600;cursor:pointer;box-shadow:0 6px 16px rgba(79,154,147,0.32);\" style-hover=\"background:#43857f;\">Back to home<\u002Fbutton>\n            <button onclick=\"{{ goCourses }}\" style=\"display:inline-flex;align-items:center;justify-content:center;min-height:62px;padding:0 34px;border:2px solid #cfe0dc;border-radius:16px;background:#fff;color:#2f5d58;font-family:Lexend;font-size:20px;font-weight:600;cursor:pointer;\" style-hover=\"background:#f3f9f8;\">My courses<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){ super(props); this.fileInput = React.createRef(); }\n  componentDidMount(){ window.__curApp = this; }\n  state = { screen:'home', courseId:'wix', lessonId:'w9', files:[], note:'', submitted:{}, steps:{} };\n\n  courses = [\n    { id:'py', name:'Python Programming', short:'Python', color:'#4f9a93', tint:'#dcebe8', initial:'Py',\n      lessons:[\n        { id:'py1', title:'Saying Hello with print()', sub:'Your very first program', mins:15, status:'done' },\n        { id:'py2', title:'Storing Things in Variables', sub:'Little boxes for your data', mins:20, status:'done' },\n        { id:'py3', title:'Asking Questions with input()', sub:'Talk to the person using your program', mins:20, status:'todo', due:'Tomorrow' },\n        { id:'py4', title:'Making Choices with if', sub:'When this is true, do that', mins:25, status:'soon' },\n        { id:'py5', title:'Repeating with Loops', sub:'Do something again and again', mins:25, status:'soon' },\n      ] },\n    { id:'wix', name:'Website Development', short:'Web', color:'#7fae86', tint:'#e9f1e8', initial:'W',\n      lessons:[\n        { id:'w5', title:'Lesson 5 \\u2014 Day 1', sub:'Pages and layout basics', mins:20, status:'done' },\n        { id:'w6', title:'Lesson 6 \\u2014 Day 2', sub:'Styling your site', mins:20, status:'done' },\n        { id:'w7', title:'Lesson 7 \\u2014 Day 1', sub:'Adding sections', mins:20, status:'done' },\n        { id:'w8', title:'Lesson 9 \\u2014 Day 1 (Filter / Sort)', sub:'Show the right items', mins:25, status:'todo', due:'Friday' },\n        { id:'w9', title:'Lesson 9 \\u2014 Day 2 (Dynamic Pages)', sub:'One layout, many pages', mins:25, status:'todo', due:'Monday' },\n        { id:'w10', title:'AI Chat Lesson', sub:'Build a helper bot', mins:20, status:'soon' },\n      ] },\n  ];\n\n  STEPS = {\n    w9: [\n      'Make a Collection called Agents. Give it: Name, Location, Bio, Image, and Slug.',\n      'Make a new page called Agents.',\n      'Add a text box to search by location, and a Search button next to it.',\n      'Add a Repeater with a picture, two texts (name and location), and a Read More button.',\n      'Connect your Repeater to the Agents Collection.',\n    ],\n  };\n  GENERIC = [\n    'Open the lesson and read each part slowly.',\n    'Try the example yourself.',\n    'Finish the practice task.',\n    'Turn in your work when you feel ready.',\n  ];\n\n  eff(l){ return this.state.submitted[l.id] ? 'turnedin' : l.status; }\n  getCourse(id){ return this.courses.find(c=>c.id===id); }\n  getLesson(cid,lid){ const c=this.getCourse(cid); return c ? c.lessons.find(l=>l.id===lid) : null; }\n\n  go(screen){ this.setState({ screen }); }\n  openCourse(id){ this.setState({ screen:'course', courseId:id }); }\n  openLesson(cid,lid){ this.setState({ screen:'lesson', courseId:cid, lessonId:lid }); }\n  toggleStep(lid,i){ this.setState(s=>{ const cur=(s.steps[lid]||[]); const next = cur.includes(i)? cur.filter(x=>x!==i): cur.concat(i); return { steps: Object.assign({}, s.steps, { [lid]: next }) }; }); }\n  onPick(e){ const names=[].slice.call(e.target.files).map(f=>f.name); this.setState(s=>({ files: s.files.concat(names) })); e.target.value=''; }\n  removeFile(i){ this.setState(s=>({ files: s.files.filter((_,j)=>j!==i) })); }\n  doSubmit(){ this.setState(s=>({ submitted: Object.assign({}, s.submitted, { [s.lessonId]: true }), screen:'done', files:[], note:'' })); }\n  resetAndHome(){ this.setState({ files:[], note:'', screen:'home' }); }\n\n  statusStyle(eff){\n    if(eff==='done') return { label:'Done', pillBg:'#e3f3e9', pillColor:'#3f7d57' };\n    if(eff==='turnedin') return { label:'Turned in', pillBg:'#dcebe8', pillColor:'#2f6f68' };\n    if(eff==='todo') return { label:'To do', pillBg:'#eef3f1', pillColor:'#4a6b67' };\n    return { label:'Soon', pillBg:'#f2f4f3', pillColor:'#9aa8a5' };\n  }\n\n  vmLesson(c,l){\n    const eff=this.eff(l);\n    const ss=this.statusStyle(eff);\n    return {\n      id:l.id, title:l.title, sub:l.sub, mins:l.mins, due:l.due||'',\n      courseName:c.short, courseFull:c.name, color:c.color, tint:c.tint,\n      eff, isDone:eff==='done', isTurned:eff==='turnedin', isTodo:eff==='todo', isSoon:eff==='soon',\n      statusLabel: ss.label, pillBg: ss.pillBg, pillColor: ss.pillColor,\n      open:()=>this.openLesson(c.id,l.id),\n    };\n  }\n\n  renderVals(){\n    const s=this.state;\n    const coursesList = this.courses.map(c=>{\n      const total=c.lessons.length;\n      const done=c.lessons.filter(l=>{ const e=this.eff(l); return e==='done'||e==='turnedin'; }).length;\n      const pct=Math.round(done/total*100);\n      return { id:c.id, name:c.name, short:c.short, color:c.color, tint:c.tint, initial:c.initial,\n        total, done, pct, pctText: pct+'%', doneText: done+' of '+total+' lessons done',\n        open:()=>this.openCourse(c.id) };\n    });\n\n    const wix=this.getCourse('wix');\n    const nextUp = this.vmLesson(wix, wix.lessons.find(l=>l.id==='w9'));\n\n    const todoList=[];\n    this.courses.forEach(c=> c.lessons.forEach(l=>{ if(this.eff(l)==='todo') todoList.push(this.vmLesson(c,l)); }));\n    const todoTop = todoList.slice(0,3);\n\n    const curCourseRaw=this.getCourse(s.courseId) || wix;\n    const curCourse = coursesList.find(c=>c.id===s.courseId) || coursesList[1];\n    const curLessons = curCourseRaw.lessons.map(l=>this.vmLesson(curCourseRaw,l));\n\n    const lObj=this.getLesson(s.courseId, s.lessonId) || wix.lessons.find(l=>l.id==='w9');\n    const cObj=this.getCourse(s.courseId) || wix;\n    const curLesson=this.vmLesson(cObj,lObj);\n    curLesson.isW9 = lObj.id==='w9';\n    curLesson.explainer = curLesson.isW9\n      ? 'Dynamic pages take one layout and your content, and build a page for each item. Change the layout once, and every page updates by itself.'\n      : 'Read each part slowly. Try the example. Then finish the practice task and turn it in when you feel ready.';\n\n    const stepsArr = this.STEPS[lObj.id] || this.GENERIC;\n    const doneIdx = s.steps[lObj.id]||[];\n    const lessonSteps = stepsArr.map((text,i)=>({\n      text, n:i+1, done: doneIdx.includes(i), notDone: !doneIdx.includes(i),\n      rowBg: doneIdx.includes(i) ? '#eef6f4' : '#fbfdfc',\n      rowBorder: doneIdx.includes(i) ? '#bcdcd6' : '#e6efed',\n      toggle:()=>this.toggleStep(lObj.id,i),\n    }));\n\n    const files = s.files.map((name,i)=>({ name, remove:()=>this.removeFile(i) }));\n\n    return {\n      isHome: s.screen==='home', isCourses: s.screen==='courses', isCourse: s.screen==='course',\n      isLesson: s.screen==='lesson', isSubmit: s.screen==='submit', isDone: s.screen==='done',\n      isTodoScreen: s.screen==='todo',\n      student:'Maya',\n      homeBg: s.screen==='home'?'#e3f0ee':'transparent',\n      coursesBg: (s.screen==='courses'||s.screen==='course')?'#e3f0ee':'transparent',\n      todoBg: s.screen==='todo'?'#e3f0ee':'transparent',\n      goHome:()=>this.go('home'), goCourses:()=>this.go('courses'), goTodo:()=>this.go('todo'),\n      coursesList, nextUp, todoTop, hasTodo: todoTop.length>0, todoCount: todoList.length, todoAll: todoList,\n      curCourse, curLessons,\n      curLesson, lessonSteps, stepsDoneCount: doneIdx.length, stepsTotal: lessonSteps.length,\n      turnIn:()=>this.go('submit'),\n      backToCourse:()=>this.openCourse(s.courseId),\n      backToLesson:()=>this.go('lesson'),\n      files, hasFiles: files.length>0,\n      note: s.note, onNote:(e)=>this.setState({note:e.target.value}),\n      pickFile:()=>{ if(this.fileInput.current) this.fileInput.current.click(); },\n      onPick:(e)=>this.onPick(e), fileInputRef:this.fileInput,\n      doSubmit:()=>this.doSubmit(), resetHome:()=>this.resetAndHome(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
